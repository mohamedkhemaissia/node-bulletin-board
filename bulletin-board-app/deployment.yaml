apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulletin-board-deployment
  labels:
    app: bulletin-board
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bulletin-board
  template:
    metadata:
      labels:
        app: bulletin-board
    spec:
      containers:
      - name: bulletin-board-container
        image: bulletin-board:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bulletin-board-service
spec:
  type: LoadBalancer # Crée un point d'accès accessible depuis ton PC
  selector:
    app: bulletin-board
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080