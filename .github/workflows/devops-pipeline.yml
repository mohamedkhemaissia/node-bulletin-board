name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "dev" ] # Le pipeline se déclenche UNIQUEMENT quand tu pushes sur dev

jobs:
  pipeline-unique:
    name: Pipeline Qualité, Sécurité, Synchro main et Docker
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nécessaire pour que le robot mette à jour la branche main
      packages: write  # Nécessaire pour publier le package Docker
    
    steps:
      # --- 1. Récupération du code ---
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 2. Analyse Qualité (SonarCloud) ---
      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=mohamedkhemaissia
            -Dsonar.projectKey=mohamedkhemaissia_node-bulletin-board
            -Dsonar.projectName=node-bulletin-board
            -Dsonar.sources=bulletin-board-app

      # --- 3. Scan de Sécurité (Trivy) ---
      - name: Scanner le code avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'bulletin-board-app'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # --- 4. Synchronisation automatique vers main ---
      # Le robot fusionne lui-même dev dans main si les tests passent !
      - name: Fusionner automatiquement dev vers main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge origin/dev --ff-only
          git push origin main

      # --- 5. Connexion au Registre GitHub (GHCR) ---
      - name: Connexion au Registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- 6. Build & Publication de l'image Docker ---
      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./bulletin-board-app
          push: true
          tags: |
            ghcr.io/mohamedkhemaissia/node-bulletin-board:latest