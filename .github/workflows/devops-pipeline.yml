name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "dev" ] # Un seul push sur dev déclenche tout

# On force l'autorisation d'écriture pour les packages et le code
permissions:
  contents: write
  packages: write

jobs:
  pipeline-unique:
    name: Pipeline Global DevSecOps
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=mohamedkhemaissia
            -Dsonar.projectKey=mohamedkhemaissia_node-bulletin-board
            -Dsonar.projectName=node-bulletin-board
            -Dsonar.sources=bulletin-board-app

      - name: Scanner le code avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'bulletin-board-app'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # Connexion au Registre Docker (GHCR)
      - name: Connexion au Registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build et envoi de l'image Docker directement
      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./bulletin-board-app
          push: true
          tags: |
            ghcr.io/mohamedkhemaissia/node-bulletin-board:latest

      # Une fois que l'image est publiée avec succès, on synchronise main
      - name: Fusionner automatiquement dev vers main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge origin/dev --ff-only
          git push origin main