name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  sonarcloud:
    name: Analyse Qualité Code (SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=mohamedkhemaissia
            -Dsonar.projectKey=mohamedkhemaissia_node-bulletin-board
            -Dsonar.projectName=node-bulletin-board
            -Dsonar.sources=bulletin-board-app

  security-scan:
    name: Scan Sécurité (Trivy)
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      - name: Scanner le code avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'bulletin-board-app'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  build-and-push-docker:
    name: Build & Push Image Docker
    if: github.ref == 'refs/heads/main'
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial pour publier le package
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion au Registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./bulletin-board-app
          push: true
          # On écrit le chemin en minuscules strictes pour éviter le blocage de GitHub
          tags: |
            ghcr.io/mohamedkhemaissia/node-bulletin-board:latest
            ghcr.io/mohamedkhemaissia/node-bulletin-board:${{ github.sha }}